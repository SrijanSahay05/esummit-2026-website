name: Setup Branch Protection

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/setup-branch-protection.yml'

permissions:
  contents: read
  # `administration: write` only works for GitHub Apps using fine-grained tokens.
  # For a classic PAT stored as ADMIN_TOKEN, the token needs `repo` scope.
  # The standard GITHUB_TOKEN generated by Actions cannot manage branch
  # protection rules — an ADMIN_TOKEN secret must be configured.
  administration: write

jobs:
  protect-main:
    name: Enforce branch protection on main
    runs-on: ubuntu-latest

    steps:
      - name: Apply branch protection rules to main
        uses: actions/github-script@v7
        with:
          # Requires a PAT stored as Settings → Secrets → ADMIN_TOKEN.
          # Classic PAT: needs `repo` scope.
          # Fine-grained PAT: needs `administration:write` repository permission.
          # The default GITHUB_TOKEN cannot manage branch protection rules.
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch: 'main',
              required_status_checks: {
                strict: true,
                contexts: ['Lint & Build'],
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: true,
                required_approving_review_count: 1,
              },
              restrictions: null,   // no push restrictions beyond PR requirement
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_conversation_resolution: true,
              lock_branch: false,
            });

            // Ensure the label used by the guard workflow exists.
            try {
              await github.rest.issues.createLabel({
                owner:       owner,
                repo:        repo,
                name:        'direct-push',
                color:       'D93F0B',
                description: 'Commit pushed directly to main without a PR',
              });
            } catch (err) {
              // Label already exists — that's fine.
              if (!err.message.includes('already_exists') && err.status !== 422) throw err;
            }

            core.info('✅ Branch protection applied to main');
